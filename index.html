<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casio Calculator</title>
</head>

<body>
    <div class="casio-calculator">
        <div class="brand">CASIO</div>
        <div class="model"></div>
        <div class="solar-panel"></div>
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="btn clear" onclick="clearDisplay()">AC</button>
            <button class="btn function" onclick="appendToDisplay('(')">(</button>
            <button class="btn function" onclick="appendToDisplay(')')">)</button>
            <button class="btn operator" onclick="appendToDisplay('/')">÷</button>

            <button class="btn" onclick="appendToDisplay('7')">7</button>
            <button class="btn" onclick="appendToDisplay('8')">8</button>
            <button class="btn" onclick="appendToDisplay('9')">9</button>
            <button class="btn operator" onclick="appendToDisplay('*')">×</button>

            <button class="btn" onclick="appendToDisplay('4')">4</button>
            <button class="btn" onclick="appendToDisplay('5')">5</button>
            <button class="btn" onclick="appendToDisplay('6')">6</button>
            <button class="btn operator" onclick="appendToDisplay('-')">-</button>

            <button class="btn" onclick="appendToDisplay('1')">1</button>
            <button class="btn" onclick="appendToDisplay('2')">2</button>
            <button class="btn" onclick="appendToDisplay('3')">3</button>
            <button class="btn operator" onclick="appendToDisplay('+')">+</button>

            <button class="btn" onclick="appendToDisplay('0')">0</button>
            <button class="btn" onclick="appendToDisplay('.')">.</button>
            <button class="btn function" onclick="backspace()">DEL</button>
            <button class="btn equals" onclick="calculateResult()">=</button>
        </div>
    </div>
    <footer>
        <script>
            var currentYear = new Date().getFullYear();
            document.write("© " + currentYear + " Vutivi Vukeya. All Rights Reserved.<br>");

            var lastModified = new Date(document.lastModified);
            var formattedTime = lastModified.toLocaleTimeString('en-US', {
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            var formattedDate = lastModified.toDateString();
            document.write("Last modified: " + formattedTime + " on " + formattedDate + "<br>");

            document.write("Powered by Vutivi Vukeya | Licensed under MIT License");
        </script>
    </footer>
</body>

</html>
